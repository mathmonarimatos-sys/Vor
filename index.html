<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Treinador VOR Interativo - Espera refinada preview 8</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    html, body {
      margin: 0;
      min-height: 100%;
      background: #f1f5f9;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useEffect, useMemo, useRef, useState } = React;

    const norm360 = (d) => ((d % 360) + 360) % 360;
    const norm180 = (d) => {
      const n = norm360(d);
      return n > 180 ? n - 360 : n;
    };
    const rad = (d) => (d * Math.PI) / 180;
    const deg = (r) => (r * 180) / Math.PI;
    const fmt = (n) => String(Math.round(norm360(n))).padStart(3, "0") + "°";
    const timeFmt = (s) => {
      const t = Math.max(0, Math.floor(s * 10));
      const m = Math.floor(t / 600);
      const sec = Math.floor((t % 600) / 10);
      return `${String(m).padStart(2, "0")}:${String(sec).padStart(2, "0")}.${t % 10}`;
    };

    function bearing(from, to) {
      return norm360(deg(Math.atan2(to.x - from.x, -(to.y - from.y))));
    }

    function pt(origin, brg, dist) {
      return {
        x: origin.x + Math.sin(rad(brg)) * dist,
        y: origin.y - Math.cos(rad(brg)) * dist,
      };
    }

    function Aircraft({ x, y, hdg }) {
      return (
        <g transform={`translate(${x} ${y}) rotate(${hdg})`}>
          <path d="M0-24 L8 2 L34 10 L34 20 L5 14 L4 34 L-4 34 L-5 14 L-34 20 L-34 10 L-8 2 Z" fill="white" stroke="#0f172a" strokeWidth="2.5" />
          <path d="M0-24 L0 32" stroke="#2563eb" strokeWidth="2" />
          <circle r="4" fill="#2563eb" />
        </g>
      );
    }

    function Vor({ c }) {
      return (
        <g transform={`translate(${c.x} ${c.y})`}>
          <circle r="28" fill="#e0f2fe" stroke="#0369a1" strokeWidth="3" />
          <polygon points="0,-17 16,12 -16,12" fill="none" stroke="#0369a1" strokeWidth="3" />
          <circle r="5" fill="#0369a1" />
          <text y="52" textAnchor="middle" className="fill-slate-900 text-[18px] font-bold">VOR</text>
        </g>
      );
    }

    function Compass({ c, r }) {
      const ticks = Array.from({ length: 72 }, (_, i) => i * 5);
      return (
        <g>
          <circle cx={c.x} cy={c.y} r={r} fill="none" stroke="#94a3b8" strokeWidth="2" strokeDasharray="5 8" />
          {ticks.map((m) => {
            const a = pt(c, m, r - (m % 30 === 0 ? 16 : m % 10 === 0 ? 10 : 6));
            const b = pt(c, m, r);
            return <line key={m} x1={a.x} y1={a.y} x2={b.x} y2={b.y} stroke="#64748b" strokeWidth={m % 30 === 0 ? 2.4 : 1.2} />;
          })}
          {Array.from({ length: 12 }, (_, i) => i * 30).map((m) => {
            const p = pt(c, m, r - 35);
            return <text key={m} x={p.x} y={p.y + 5} textAnchor="middle" className="fill-slate-500 text-[13px] font-semibold">{String(m).padStart(3, "0")}</text>;
          })}
          {[
            { b: 0, label: "N" },
            { b: 90, label: "E" },
            { b: 180, label: "S" },
            { b: 270, label: "W" },
          ].map((item) => {
            const p = pt(c, item.b, r + 26);
            return <text key={item.label} x={p.x} y={p.y + 6} textAnchor="middle" className="fill-slate-900 text-[24px] font-black">{item.label}</text>;
          })}
        </g>
      );
    }

    function halfDiskPath(c, r, centerBearing) {
      const start = norm360(centerBearing - 90);
      const mid = centerBearing;
      const end = norm360(centerBearing + 90);
      const p1 = pt(c, start, r);
      const p2 = pt(c, mid, r);
      const p3 = pt(c, end, r);
      return `M ${c.x} ${c.y} L ${p1.x} ${p1.y} A ${r} ${r} 0 0 1 ${p2.x} ${p2.y} A ${r} ${r} 0 0 1 ${p3.x} ${p3.y} Z`;
    }

    function courseTextAngle(course) {
      const a = norm180(course - 90);
      if (a > 90) return a - 180;
      if (a < -90) return a + 180;
      return a;
    }

    function holdShape(fix, inbound, side, legNm) {
      const leg = legNm * 22;
      const width = 96;
      const sign = side === "right" ? 1 : -1;
      const off = { x: Math.cos(rad(inbound)) * sign * width, y: Math.sin(rad(inbound)) * sign * width };
      const a = pt(fix, inbound + 180, leg);
      const b = fix;
      const c = { x: fix.x + off.x, y: fix.y + off.y };
      const d = { x: a.x + off.x, y: a.y + off.y };
      const sweep = side === "right" ? 1 : 0;
      const rr = width / 2;
      return {
        path: `M ${a.x} ${a.y} L ${b.x} ${b.y} A ${rr} ${rr} 0 0 ${sweep} ${c.x} ${c.y} L ${d.x} ${d.y} A ${rr} ${rr} 0 0 ${sweep} ${a.x} ${a.y}`,
        inboundStart: a,
        fix: b,
        outboundStart: c,
        outboundEnd: d,
        turnSide: side,
        radius: rr,
        outbound: norm360(inbound + 180),
      };
    }

    function RMI({ hdg, qdm, radial }) {
      const pointer = norm180(qdm - hdg);
      const ticks = Array.from({ length: 72 }, (_, i) => i * 5);
      const labels = Array.from({ length: 12 }, (_, i) => i * 30);
      return (
        <div className="rounded-3xl bg-slate-950 p-4 text-white shadow-xl border border-slate-700 overflow-hidden">
          <div className="mb-3 flex items-start justify-between gap-3">
            <div>
              <div className="text-xs uppercase tracking-[0.18em] text-sky-300">Indicador RMI</div>
              <div className="text-lg font-black">Limbo movel</div>
            </div>
            <div className="rounded-2xl bg-slate-900 px-3 py-2 text-right text-[11px] font-bold leading-5 border border-slate-800">HDG {fmt(hdg)}<br />QDM {fmt(qdm)}</div>
          </div>
          <svg viewBox="0 0 300 300" className="mx-auto block h-[260px] w-full max-w-[300px]">
            <defs>
              <radialGradient id="rmiGlassReact" cx="50%" cy="35%" r="70%"><stop offset="0%" stopColor="#1e293b" /><stop offset="72%" stopColor="#020617" /><stop offset="100%" stopColor="#000" /></radialGradient>
              <filter id="rmiGlowReact" x="-30%" y="-30%" width="160%" height="160%"><feGaussianBlur stdDeviation="2" result="b" /><feMerge><feMergeNode in="b" /><feMergeNode in="SourceGraphic" /></feMerge></filter>
            </defs>
            <circle cx="150" cy="150" r="145" fill="#111827" stroke="#475569" strokeWidth="4" />
            <circle cx="150" cy="150" r="128" fill="url(#rmiGlassReact)" stroke="#94a3b8" strokeWidth="2" />
            <g transform="translate(150 150)">
              {ticks.map((m) => {
                const major = m % 30 === 0;
                const medium = m % 10 === 0;
                const sb = norm360(m - hdg);
                const a = pt({ x: 0, y: 0 }, sb, major ? 96 : medium ? 101 : 106);
                const b = pt({ x: 0, y: 0 }, sb, 118);
                return <line key={m} x1={a.x} y1={a.y} x2={b.x} y2={b.y} stroke={major ? "#f8fafc" : "#cbd5e1"} strokeWidth={major ? 2.2 : medium ? 1.4 : 0.8} />;
              })}
              {labels.map((m) => {
                const p = pt({ x: 0, y: 0 }, norm360(m - hdg), 78);
                const txt = m === 0 ? "N" : m === 90 ? "E" : m === 180 ? "S" : m === 270 ? "W" : String(m / 10).padStart(2, "0");
                return <text key={m} x={p.x} y={p.y + 5} textAnchor="middle" dominantBaseline="middle" className={m % 90 === 0 ? "fill-white text-[21px] font-black" : "fill-slate-200 text-[14px] font-extrabold"}>{txt}</text>;
              })}
            </g>
            <polygon points="150,14 139,40 161,40" fill="#f8fafc" stroke="#0f172a" />
            <line x1="150" y1="42" x2="150" y2="78" stroke="#f8fafc" strokeWidth="3" strokeLinecap="round" />
            <rect x="198" y="24" width="72" height="30" rx="8" fill="#020617" stroke="#38bdf8" strokeWidth="1.5" />
            <text x="234" y="36" textAnchor="middle" className="fill-slate-400 text-[8px] font-bold">HDG</text>
            <text x="234" y="49" textAnchor="middle" className="fill-sky-100 text-[15px] font-black">{String(Math.round(norm360(hdg))).padStart(3, "0")}</text>
            <g transform={`translate(150 150) rotate(${pointer})`}>
              <line x1="0" y1="96" x2="0" y2="-92" stroke="#facc15" strokeWidth="6" strokeLinecap="round" filter="url(#rmiGlowReact)" />
              <polygon points="0,-118 -12,-91 12,-91" fill="#facc15" stroke="#854d0e" />
              <rect x="-7" y="76" width="14" height="27" rx="5" fill="#facc15" stroke="#854d0e" />
            </g>
            <g transform="translate(150 150)"><path d="M0-23 L7-1 L26 8 L26 14 L5 10 L4 26 L-4 26 L-5 10 L-26 14 L-26 8 L-7-1 Z" fill="#e2e8f0" stroke="#020617" strokeWidth="2" /><circle r="8" fill="#e2e8f0" stroke="#0f172a" strokeWidth="2" /></g>
          </svg>
          <div className="mt-3 grid grid-cols-2 gap-2 text-sm">
            <div className="rounded-2xl bg-slate-900 p-3 border border-slate-800"><div className="text-[11px] text-slate-400">Cabeca</div><div className="text-xl font-black text-yellow-300">{fmt(qdm)}</div><div className="text-[11px] text-slate-400">QDM / TO</div></div>
            <div className="rounded-2xl bg-slate-900 p-3 border border-slate-800"><div className="text-[11px] text-slate-400">Cauda</div><div className="text-xl font-black text-sky-300">{fmt(radial)}</div><div className="text-[11px] text-slate-400">Radial</div></div>
          </div>
        </div>
      );
    }

    function VORCDI({ obs, setObs, radial, qdm, selectedRadial }) {
      const toSense = Math.abs(norm180(obs - qdm)) <= 90;
      const flag = toSense ? "TO" : "FROM";
      const rawDev = toSense
        ? norm180(qdm - obs)
        : norm180(obs - radial);
      const limitedDev = Math.max(-10, Math.min(10, rawDev));
      const dotSpacing = 11.2;
      const barX = (limitedDev / 10) * dotSpacing * 5;
      const ticks = Array.from({ length: 72 }, (_, i) => i * 5);
      const labels = Array.from({ length: 12 }, (_, i) => i * 30);
      const devText = Math.abs(rawDev) < 0.1 ? "CENTRADO" : `${rawDev > 0 ? "+" : ""}${rawDev.toFixed(1)}°`;

      return (
        <div className="rounded-3xl bg-white p-4 shadow-xl border border-slate-200">
          <div className="mb-3 flex items-start justify-between gap-3">
            <div>
              <div className="text-xs uppercase tracking-[0.18em] text-emerald-700">VOR analogico</div>
              <div className="text-lg font-black text-slate-900">CDI / OBS</div>
            </div>
            <div className="rounded-2xl bg-slate-900 px-3 py-2 text-right text-[11px] font-bold leading-5 text-white">
              OBS {fmt(obs)}<br />{flag}
            </div>
          </div>

          <div className="mb-3 grid grid-cols-4 gap-2">
            <button onClick={() => setObs((v) => norm360(v - 10))} className="rounded-xl bg-slate-900 px-2 py-2 text-xs font-black text-white">-10</button>
            <button onClick={() => setObs((v) => norm360(v - 1))} className="rounded-xl bg-slate-900 px-2 py-2 text-xs font-black text-white">◀ 1</button>
            <button onClick={() => setObs((v) => norm360(v + 1))} className="rounded-xl bg-slate-900 px-2 py-2 text-xs font-black text-white">1 ▶</button>
            <button onClick={() => setObs((v) => norm360(v + 10))} className="rounded-xl bg-slate-900 px-2 py-2 text-xs font-black text-white">+10</button>
          </div>

          <div className="mb-3 grid grid-cols-2 gap-2">
            <button onClick={() => setObs(selectedRadial)} className="rounded-xl bg-red-100 px-3 py-2 text-xs font-black text-red-900">OBS = radial selecionada</button>
            <button onClick={() => setObs(radial)} className="rounded-xl bg-sky-100 px-3 py-2 text-xs font-black text-sky-900">OBS = radial atual</button>
          </div>

          <svg viewBox="0 0 320 320" className="mx-auto block h-[300px] w-full max-w-[320px]">
            <defs>
              <radialGradient id="vorGlassReact" cx="50%" cy="35%" r="70%"><stop offset="0%" stopColor="#f8fafc" /><stop offset="100%" stopColor="#e2e8f0" /></radialGradient>
            </defs>
            <circle cx="160" cy="160" r="150" fill="#dfe5ec" stroke="#94a3b8" strokeWidth="4" />
            <circle cx="160" cy="160" r="130" fill="url(#vorGlassReact)" stroke="#cbd5e1" strokeWidth="2" />

            <g transform="translate(160 160)">
              {ticks.map((m) => {
                const major = m % 30 === 0;
                const medium = m % 10 === 0;
                const sb = norm360(m - obs);
                const a = pt({ x: 0, y: 0 }, sb, major ? 95 : medium ? 101 : 106);
                const b = pt({ x: 0, y: 0 }, sb, 118);
                return <line key={m} x1={a.x} y1={a.y} x2={b.x} y2={b.y} stroke={major ? "#0f172a" : "#475569"} strokeWidth={major ? 2.2 : medium ? 1.4 : 0.8} />;
              })}
              {labels.map((m) => {
                const p = pt({ x: 0, y: 0 }, norm360(m - obs), 78);
                const txt = m === 0 ? "N" : m === 90 ? "E" : m === 180 ? "S" : m === 270 ? "W" : String(m / 10).padStart(2, "0");
                return <text key={m} x={p.x} y={p.y + 5} textAnchor="middle" dominantBaseline="middle" className={m % 90 === 0 ? "fill-slate-900 text-[20px] font-black" : "fill-slate-700 text-[14px] font-extrabold"}>{txt}</text>;
              })}
            </g>

            <polygon points="160,12 150,33 170,33" fill="#ef4444" stroke="#7f1d1d" />
            <rect x="126" y="36" width="68" height="30" rx="7" fill="#0f172a" stroke="#10b981" strokeWidth="1.5" />
            <text x="160" y="47" textAnchor="middle" className="fill-emerald-300 text-[8px] font-bold">OBS</text>
            <text x="160" y="60" textAnchor="middle" className="fill-white text-[16px] font-black">{String(Math.round(norm360(obs))).padStart(3, "0")}</text>

            <line x1="104" y1="160" x2="216" y2="160" stroke="#334155" strokeWidth="2" />
            {[-5, -4, -3, -2, -1, 1, 2, 3, 4, 5].map((n) => <circle key={n} cx={160 + n * dotSpacing} cy="160" r="3.8" fill="#64748b" />)}
            <circle cx="160" cy="160" r="4.8" fill="#111827" />
            <rect x={156 + barX} y="108" width="8" height="104" rx="4" fill="#111827" stroke="#000" />

            {flag === "TO" ? (
              <g><polygon points="160,104 146,128 174,128" fill="#10b981" stroke="#065f46" /><text x="160" y="96" textAnchor="middle" className="fill-emerald-700 text-[12px] font-black">TO</text></g>
            ) : (
              <g><polygon points="160,216 146,192 174,192" fill="#3b82f6" stroke="#1d4ed8" /><text x="160" y="234" textAnchor="middle" className="fill-sky-700 text-[12px] font-black">FROM</text></g>
            )}

            <g transform="translate(265 255)">
              <circle r="28" fill="#cbd5e1" stroke="#64748b" strokeWidth="2" />
              <circle r="18" fill="#94a3b8" stroke="#475569" strokeWidth="2" />
              <g transform={`rotate(${obs})`}><line x1="0" y1="-18" x2="0" y2="-28" stroke="#111827" strokeWidth="3" strokeLinecap="round" /></g>
              <text y="44" textAnchor="middle" className="fill-slate-600 text-[10px] font-bold">OBS</text>
            </g>
          </svg>

          <div className="mt-3 grid grid-cols-2 gap-2 text-sm">
            <div className="rounded-2xl bg-slate-50 p-3 border border-slate-200"><div className="text-[11px] uppercase tracking-[0.14em] text-slate-500">Desvio</div><div className="mt-1 text-xl font-black text-slate-900">{devText}</div></div>
            <div className="rounded-2xl bg-slate-50 p-3 border border-slate-200"><div className="text-[11px] uppercase tracking-[0.14em] text-slate-500">Escala</div><div className="mt-1 text-xl font-black text-slate-900">2°/dot</div></div>
          </div>
        </div>
      );
    }

    function Card({ title, value, tone = "text-slate-900" }) {
      return <div className="rounded-2xl bg-white p-3 shadow-sm border border-slate-200"><div className="text-[11px] uppercase tracking-[0.16em] text-slate-500">{title}</div><div className={`mt-1 text-2xl font-black ${tone}`}>{value}</div></div>;
    }

    function TreinadorVORInterativo() {
      const svgRef = useRef(null);
      const center = { x: 380, y: 340 };
      const mapRadius = 295;
      const initial = { x: 500, y: 340 };
      const [aircraft, setAircraft] = useState(initial);
      const [heading, setHeading] = useState(90);
      const [selectedRadial, setSelectedRadial] = useState(90);
      const [obsCourse, setObsCourse] = useState(90);
      const [dragging, setDragging] = useState(false);
      const [rotating, setRotating] = useState(false);
      const [showReciprocal, setShowReciprocal] = useState(true);
      const [showToFromArea, setShowToFromArea] = useState(false);
      const [showHolding, setShowHolding] = useState(false);
      const [holdingInbound, setHoldingInbound] = useState(360);
      const [holdingTurn, setHoldingTurn] = useState("right");
      const [holdingLegNm, setHoldingLegNm] = useState(5);
      const [isFlying, setIsFlying] = useState(false);
      const [speedKt, setSpeedKt] = useState(140);
      const [bankDeg, setBankDeg] = useState(0);
      const [turnMode, setTurnMode] = useState("rate");
      const [rateDegSec, setRateDegSec] = useState(0);
      const [simRate, setSimRate] = useState(1);
      const [elapsed, setElapsed] = useState(0);
      const [chrono, setChrono] = useState(false);
      const [track, setTrack] = useState([initial]);
      const aircraftRef = useRef(initial);
      const headingRef = useRef(90);
      const flyTick = useRef(null);
      const chronoTick = useRef(null);
      const elapsedRef = useRef(0);

      const qdm = useMemo(() => bearing(aircraft, center), [aircraft]);
      const radial = useMemo(() => bearing(center, aircraft), [aircraft]);
      const reciprocal = norm360(selectedRadial + 180);
      const diffRadial = norm180(radial - selectedRadial);
      const distanceNm = (Math.hypot(aircraft.x - center.x, aircraft.y - center.y) / 22).toFixed(1);
      const bankRate = speedKt > 10 ? (1091 * Math.tan(rad(bankDeg))) / speedKt : 0;
      const turnRate = turnMode === "rate" ? rateDegSec : bankRate;
      const holding = useMemo(() => holdShape(center, holdingInbound, holdingTurn, holdingLegNm), [holdingInbound, holdingTurn, holdingLegNm]);
      const toAreaPath = useMemo(() => halfDiskPath(center, mapRadius, obsCourse + 180), [obsCourse]);
      const fromAreaPath = useMemo(() => halfDiskPath(center, mapRadius, obsCourse), [obsCourse]);

      useEffect(() => { aircraftRef.current = aircraft; }, [aircraft]);
      useEffect(() => { headingRef.current = heading; }, [heading]);

      useEffect(() => {
        if (!isFlying) { flyTick.current = null; return; }
        let raf;
        const tick = (now) => {
          if (flyTick.current === null) flyTick.current = now;
          const dt = Math.min((now - flyTick.current) / 1000, 0.25);
          flyTick.current = now;
          const newHdg = norm360(headingRef.current + turnRate * dt * simRate);
          const step = (speedKt * 22 * simRate / 3600) * dt;
          const proposed = pt(aircraftRef.current, newHdg, step);
          const dx = proposed.x - center.x;
          const dy = proposed.y - center.y;
          const d = Math.hypot(dx, dy);
          const max = mapRadius - 8;
          const next = d > max ? { x: center.x + (dx / d) * max, y: center.y + (dy / d) * max } : proposed;
          headingRef.current = newHdg;
          aircraftRef.current = next;
          setHeading(newHdg);
          setAircraft(next);
          setTrack((old) => {
            const last = old[old.length - 1];
            return !last || Math.hypot(last.x - next.x, last.y - next.y) > 7 ? [...old.slice(-95), next] : old;
          });
          if (d > max) { setIsFlying(false); flyTick.current = null; return; }
          raf = requestAnimationFrame(tick);
        };
        raf = requestAnimationFrame(tick);
        return () => cancelAnimationFrame(raf);
      }, [isFlying, speedKt, turnRate, simRate]);

      useEffect(() => {
        if (!chrono) { chronoTick.current = null; return; }
        let raf;
        const tick = (now) => {
          if (chronoTick.current === null) chronoTick.current = now;
          const dt = Math.min((now - chronoTick.current) / 1000, 0.25);
          chronoTick.current = now;
          elapsedRef.current += dt * simRate;
          setElapsed(elapsedRef.current);
          raf = requestAnimationFrame(tick);
        };
        raf = requestAnimationFrame(tick);
        return () => cancelAnimationFrame(raf);
      }, [chrono, simRate]);

      function moveAircraft(clientX, clientY) {
        setIsFlying(false);
        const svg = svgRef.current;
        if (!svg) return;
        const p = svg.createSVGPoint();
        p.x = clientX;
        p.y = clientY;
        const local = p.matrixTransform(svg.getScreenCTM().inverse());
        const dx = local.x - center.x;
        const dy = local.y - center.y;
        const d = Math.hypot(dx, dy);
        const max = mapRadius - 8;
        const next = d > max ? { x: center.x + (dx / d) * max, y: center.y + (dy / d) * max } : { x: local.x, y: local.y };
        setAircraft(next);
        setTrack((old) => [...old.slice(-95), next]);
      }

      function rotateAircraft(clientX, clientY) {
        setIsFlying(false);
        const svg = svgRef.current;
        if (!svg) return;
        const p = svg.createSVGPoint();
        p.x = clientX;
        p.y = clientY;
        const local = p.matrixTransform(svg.getScreenCTM().inverse());
        setHeading(bearing(aircraftRef.current, local));
      }

      function randomHoldingScenario() {
        const inbound = Math.floor(Math.random() * 360);
        const side = Math.random() < 0.5 ? "right" : "left";
        const leg = 5;
        const approachToFix = Math.floor(Math.random() * 360);
        const pos = pt(center, approachToFix + 180, mapRadius * (0.68 + Math.random() * 0.18));
        setIsFlying(false);
        setShowHolding(true);
        setHoldingInbound(inbound);
        setHoldingTurn(side);
        setHoldingLegNm(leg);

                    <div className="rounded-2xl bg-white p-3 border border-violet-100"><div className="mb-2 flex justify-between text-sm font-bold"><span>Inbound</span><span>{fmt(holdingInbound)}</span></div><div className="flex items-center gap-2"><button onClick={() => setHoldingInbound((v) => norm360(v - 1))} className="h-10 w-10 rounded-xl bg-violet-700 text-white font-black">◀</button><input className="w-full" type="range" min="0" max="359" value={holdingInbound} onChange={(e) => setHoldingInbound(Number(e.target.value))} /><button onClick={() => setHoldingInbound((v) => norm360(v + 1))} className="h-10 w-10 rounded-xl bg-violet-700 text-white font-black">▶</button></div><div className="mt-2 grid grid-cols-2 gap-2"><button onClick={() => setHoldingInbound((v) => norm360(v - 10))} className="rounded-xl bg-violet-100 px-3 py-2 text-xs font-black text-violet-900">-10</button><button onClick={() => setHoldingInbound((v) => norm360(v + 10))} className="rounded-xl bg-violet-100 px-3 py-2 text-xs font-black text-violet-900">+10</button></div></div>
                    <div className="rounded-2xl bg-white p-3 border border-violet-100"><div className="mb-2 text-sm font-bold">Tipo</div><div className="grid grid-cols-2 gap-2"><button onClick={() => setHoldingTurn("right")} className={`rounded-xl px-3 py-3 text-sm font-black ${holdingTurn === "right" ? "bg-violet-700 text-white" : "bg-slate-100 text-slate-800"}`}>Padrao<br /><span className="text-xs">direita</span></button><button onClick={() => setHoldingTurn("left")} className={`rounded-xl px-3 py-3 text-sm font-black ${holdingTurn === "left" ? "bg-violet-700 text-white" : "bg-slate-100 text-slate-800"}`}>Nao padrao<br /><span className="text-xs">esquerda</span></button></div><div className="mt-3 rounded-xl bg-violet-50 px-3 py-2 text-xs font-semibold text-violet-900 border">Outbound {fmt(holding.outbound)}</div></div>
                    <label className="rounded-2xl bg-white p-3 border border-violet-100"><div className="mb-2 flex justify-between text-sm font-bold"><span>Perna</span><span>{holdingLegNm} NM</span></div><input className="w-full" type="range" min="2" max="8" step="0.5" value={holdingLegNm} onChange={(e) => setHoldingLegNm(Number(e.target.value))} /><div className="mt-3 text-xs font-semibold text-slate-600">Ajuste visual/didatico.</div></label>
                  </div>
                </div>
              </section>


              <aside className="space-y-5 min-w-0 lg:sticky lg:top-4 self-start">
                <RMI hdg={heading} qdm={qdm} radial={radial} />
                <VORCDI obs={obsCourse} setObs={setObsCourse} radial={radial} qdm={qdm} selectedRadial={selectedRadial} />
                <div className="rounded-3xl bg-white p-5 shadow-xl border border-slate-200"><div className="text-sm uppercase tracking-[0.18em] text-slate-500 font-black">Resumo</div><ul className="mt-3 space-y-2 text-sm leading-6 text-slate-700"><li><b>Radial:</b> sai da estacao.</li><li><b>QDM:</b> direcao para o VOR.</li><li><b>RMI:</b> cabeca vai para a estacao; cauda mostra a radial.</li><li><b>Espera:</b> padrao direita; nao padrao esquerda.</li><li><b>Inbound:</b> perna que chega no fixo.</li></ul></div>
                <div className="rounded-3xl bg-violet-50 p-5 shadow-xl border border-violet-100"><div className="text-sm uppercase tracking-[0.18em] text-violet-700 font-black">Espera</div><div className="mt-3 grid grid-cols-2 gap-3 text-sm"><Card title="Inbound" value={fmt(holdingInbound)} tone="text-violet-900" /><Card title="Outbound" value={fmt(holding.outbound)} tone="text-violet-900" /><Card title="Tipo" value={holdingTurn === "right" ? "Padrao" : "Nao padrao"} tone="text-violet-900" /><Card title="Curva" value={holdingTurn === "right" ? "Direita" : "Esquerda"} tone="text-violet-900" /></div></div>
              </aside>
            </div>
          </div>
        </main>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<TreinadorVORInterativo />);
  </script>
</body>
</html>
